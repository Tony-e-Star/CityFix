# netlify.toml - Netlify Configuration

[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

# Route API requests from the Netlify frontend to the native Netlify Function backend
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Redirect all other routes to index.html for Single Page App (SPA) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
