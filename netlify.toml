# netlify.toml - Netlify Configuration

[build]
  publish = "dist"
  command = "npm run build"

# Proxy API requests from the Netlify frontend to the persistent Cloud Run backend
[[redirects]]
  from = "/api/*"
  to = "https://ais-pre-d7mgkxp3mivfkjvlsqlbsc-1033877112442.asia-southeast1.run.app/api/:splat"
  status = 200
  force = true

# Redirect all other routes to index.html for Single Page App (SPA) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
